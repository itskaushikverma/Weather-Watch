name: Update README from API

on:
  schedule:
    - cron: "0 0 * * *"   
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run script
        run: npx tsx update-readme.ts

      - name: Commit changes
        run: |
             git config user.name "github-actions"
             git config user.email "actions@github.com"
             
             BRANCH=${{ github.ref_name }}

             git pull --rebase origin $BRANCH
             
             git add README.md
             
             if git diff --cached --quiet; then
               echo "No changes to commit"
               exit 0
             fi
             
             git commit -m "Auto update portfolio URL"
             
             git push origin $BRANCH